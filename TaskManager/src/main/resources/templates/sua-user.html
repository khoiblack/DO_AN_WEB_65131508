<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sửa Thông Tin Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/users"><i class="fa-solid fa-users me-2"></i>QUẢN LÝ NHÂN SỰ</a>
            <a href="/users" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-arrow-left me-1"></i>Quay lại danh sách</a>
        </div>
    </nav>

    <div class="container" style="max-width: 550px;">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-warning text-dark fw-bold text-center py-3">
                <h5 class="m-0 fw-bold"><i class="fa-solid fa-user-gear me-2"></i>CẬP NHẬT TÀI KHOẢN <span th:text="${userToEdit.username}"></span></h5>
            </div>
            <div class="card-body p-4">
                <form action="/users/capnhat" method="POST">
                    <input type="hidden" name="id" th:value="${userToEdit.id}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và Tên nhân viên</label>
                        <input type="text" name="hoTen" th:value="${userToEdit.hoTen}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Đổi vai trò quyền</label>
                        <select name="vaiTro" class="form-select">
                            <option value="MEMBER" th:selected="${userToEdit.vaiTro == 'MEMBER'}">MEMBER (Nhân viên)</option>
                            <option value="LEADER" th:selected="${userToEdit.vaiTro == 'LEADER'}">LEADER (Quản lý)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Mật khẩu mới (Để trống nếu giữ nguyên mật khẩu cũ)</label>
                        <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu mới tại đây...">
                    </div>

                    <div class="d-flex justify-content-between pt-2">
                        <a href="/users" class="btn btn-secondary px-4">Hủy bỏ</a>
                        <button type="submit" class="btn btn-warning fw-bold px-4 text-dark">LƯU CẬP NHẬT</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
