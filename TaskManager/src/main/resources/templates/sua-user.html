<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Cập Nhật Nhân Sự - Task Manager')}"></head>

<body class="bg-light overflow-hidden">
    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('users')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
                <a th:href="@{/users}" class="btn btn-light border shadow-sm me-3"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                <h3 class="fw-bold text-dark m-0">Cập Nhật Thông Tin Tài Khoản</h3>
            </div>

            <div class="card border-0 shadow-sm rounded-3 col-md-8 col-lg-6">
                <div class="card-body p-4">
                    <form action="/users/capnhat" method="POST">
                        <input type="hidden" name="id" th:value="${userToEdit.id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted">Tên đăng nhập (Không thể sửa)</label>
                            <input type="text" class="form-control bg-light" th:value="${userToEdit.username}" readonly>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" name="hoTen" class="form-control" th:value="${userToEdit.hoTen}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-danger">Đổi mật khẩu (Tùy chọn)</label>
                            <input type="text" name="password" class="form-control border-danger border-opacity-50" placeholder="Gõ pass mới vào đây. Để trống nếu không muốn đổi.">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Vai trò</label>
                            <select name="vaiTro" class="form-select">
                                <option value="MEMBER" th:selected="${userToEdit.vaiTro == 'MEMBER'}">NHÂN VIÊN</option>
                                <option value="LEADER" th:selected="${userToEdit.vaiTro == 'LEADER'}">QUẢN LÝ</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary fw-bold w-100 py-2 shadow-sm"><i class="fa-solid fa-floppy-disk me-2"></i>LƯU THAY ĐỔI</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
