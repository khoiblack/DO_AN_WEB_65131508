<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Cài Đặt Cá Nhân - Task Manager')}"></head>

<body class="bg-light overflow-hidden">

    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('profile')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0"><i class="fa-solid fa-user-shield text-secondary me-2"></i>Hồ Sơ Cá Nhân</h3>
            </div>

            <div class="row">
                <div class="col-lg-6 col-md-8">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-dark text-white py-3">
                            <h5 class="fw-bold m-0"><i class="fa-solid fa-address-card me-2"></i>Thông Tin Tài Khoản</h5>
                        </div>
                        <div class="card-body p-4">
                            <form action="/profile/capnhat" method="POST">
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-muted">Tên đăng nhập (Username)</label>
                                        <input type="text" class="form-control bg-light" th:value="${user.username}" readonly>
                                        <div class="form-text mt-1" style="font-size: 0.8rem;">* Không thể thay đổi</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-muted">Vai trò quyền (Role)</label>
                                        <input type="text" class="form-control bg-light fw-bold text-danger" th:if="${user.vaiTro == 'LEADER'}" value="QUẢN LÝ" readonly>
                                        <input type="text" class="form-control bg-light fw-bold text-info" th:if="${user.vaiTro == 'MEMBER'}" value="NHÂN VIÊN" readonly>
                                    </div>
                                </div>

                                <hr class="my-4">

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Họ và Tên hiển thị</label>
                                    <input type="text" name="hoTen" class="form-control border-primary" th:value="${user.hoTen}" required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">Đổi mật khẩu mới</label>
                                    <input type="password" name="password" class="form-control" placeholder="Để trống nếu bạn không muốn đổi mật khẩu...">
                                </div>

                                <div class="d-flex justify-content-end pt-2">
                                    <button type="submit" class="btn btn-primary fw-bold px-4 shadow-sm"><i class="fa-solid fa-floppy-disk me-2"></i>LƯU THAY ĐỔI</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-6 col-md-4 d-none d-md-flex align-items-center justify-content-center opacity-50">
                    <i class="fa-solid fa-user-check" style="font-size: 15rem; color: #dee2e6;"></i>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
