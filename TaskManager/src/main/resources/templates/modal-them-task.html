<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="fragmentThemTask" class="modal fade" id="modalThemTask" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-tasks me-2"></i>GIAO CÔNG VIỆC MỚI</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="/task/them" method="POST" onsubmit="this.querySelector('button[type=submit]').disabled = true;">
                    <div class="modal-body">
                        <div class="mb-3">
    							<label class="form-label fw-bold">Tiêu đề công việc</label>
    						<div class="input-group">
        						<input type="text" name="tieuDe" id="tieuDeInput" class="form-control" required placeholder="Ví dụ: Thiết kế giao diện...">
        						<button type="button" class="btn btn-outline-primary" onclick="goiAI()">✨ AI</button>
    						</div>
						</div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea name="noiDung" class="form-control" rows="3" placeholder="Mô tả các đầu việc cần làm..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Hạn chót (Deadline)</label>
                            <input type="date" name="deadline" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Thuộc dự án</label>
                            <select name="duAnId" class="form-select">
                                <option th:each="da : ${dsDuAn}" th:value="${da.id}" th:text="${da.tenDuAn}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giao cho nhân viên <small class="text-danger">(Giữ Ctrl để chọn nhiều)</small></label>
                            <select name="nhanVienIds" class="form-select" multiple size="3">
                                <option th:each="nd : ${dsNguoiDung}" th:value="${nd.id}" th:text="${nd.hoTen}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-success fw-bold">PHÂN CÔNG</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
	
</body>
</html>
