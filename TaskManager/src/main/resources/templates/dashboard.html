<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Bảng Điều Khiển - Task Manager')}"></head>

<body class="bg-light overflow-hidden">

    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('dashboard')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0">Tổng Quan Hoạt Động</h3>
                <span class="badge bg-white text-dark border shadow-sm px-3 py-2 fs-6">
                    <i class="fa-regular fa-clock me-2 text-primary"></i>Cập nhật theo thời gian thực
                </span>
            </div>

            <div th:if="${userRole == 'LEADER'}" class="mb-5">
                <h5 class="fw-bold mb-3" style="color: #2c3e50;"><i class="fa-solid fa-folder-open me-2 text-primary"></i>DANH SÁCH DỰ ÁN</h5>
                <div class="row g-4">
                    <div class="col-md-6 col-lg-4" th:each="duAn : ${dsDuAn}">
                        <div class="card border-0 shadow-sm border-start border-primary border-4 h-100 position-relative">
                            <div class="card-body p-4">
                                <div class="position-absolute top-0 end-0 p-2" style="z-index: 10;" th:if="${userRole == 'LEADER'}">
                                    <a th:href="@{/duan/sua(id=${duAn.id})}" class="btn btn-sm btn-outline-warning border-0 text-dark" title="Sửa Dự Án"><i class="fa-solid fa-pen"></i></a>
                                    <a th:href="@{/duan/xoa(id=${duAn.id})}" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('CẢNH BÁO: Xóa dự án này sẽ xóa TOÀN BỘ công việc bên trong!');" title="Xóa Dự Án"><i class="fa-solid fa-trash"></i></a>
                                </div>
                                <a th:href="@{/dashboard(duAnId=${duAn.id})}" class="text-decoration-none text-dark d-block pe-4 mt-2">
                                    <h5 class="card-title fw-bold text-primary mb-2" th:text="${duAn.tenDuAn}">Tên Dự Án</h5>
                                    <p class="card-text text-secondary mb-0" th:text="${duAn.moTa}" style="font-size: 0.9rem;">Mô tả dự án</p>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold m-0" style="color: #2c3e50;">
                    <i class="fa-solid fa-list-check me-2 text-success"></i>BẢNG CÔNG VIỆC CHI TIẾT
                    <span th:if="${selectedDuAnId != null}" class="badge bg-warning text-dark fs-6 ms-2 fw-normal rounded-pill">Đang lọc theo dự án</span>
                </h5>
            </div>
            
            <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0 bg-white">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3 px-4 text-muted">ID</th>
                                <th class="py-3">Tiêu đề công việc</th>
                                <th class="py-3">Hạn chót</th>
                                <th class="py-3">Nhân sự</th>
                                <th class="py-3">Trạng thái</th>
                                <th class="py-3 text-end px-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="task : ${dsNhiemVu}">
                                <td class="fw-bold text-secondary px-4" th:text="${'#' + task.id}">#1</td>
                                <td class="fw-bold text-dark" th:text="${task.tieuDe}">Tiêu đề</td>
                                <td class="text-danger fw-semibold" style="font-size: 0.9rem;">
                                    <i class="fa-regular fa-calendar-xmark me-1"></i> <span th:text="${task.deadline}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-info bg-opacity-25 text-info-emphasis border border-info px-2 py-1" th:if="${task.nguoiThucHien != null}">
                                        <i class="fa-solid fa-user-astronaut me-1"></i> <span th:text="${task.nguoiThucHien.hoTen}"></span>
                                    </span>
                                    <span class="badge bg-secondary px-2 py-1" th:if="${task.nguoiThucHien == null}">Chưa giao</span>
                                </td>
                                <td>
                                    <span th:if="${task.trangThai == 'TODO'}" class="badge bg-secondary px-3 py-2 rounded-pill shadow-sm">CẦN LÀM</span>
                                    <span th:if="${task.trangThai == 'DOING'}" class="badge bg-warning text-dark px-3 py-2 rounded-pill shadow-sm">ĐANG LÀM</span>
                                    <span th:if="${task.trangThai == 'DONE'}" class="badge bg-success px-3 py-2 rounded-pill shadow-sm">HOÀN THÀNH</span>
                                </td>
                                <td class="text-end px-4">
                                    <div class="btn-group btn-group-sm shadow-sm">
                                        <a th:href="@{/task/doitrangthai(id=${task.id}, status='TODO')}" class="btn btn-light border" title="Cần Làm">T</a>
                                        <a th:href="@{/task/doitrangthai(id=${task.id}, status='DOING')}" class="btn btn-warning text-dark border-warning" title="Đang Làm">D</a>
                                        <a th:href="@{/task/doitrangthai(id=${task.id}, status='DONE')}" class="btn btn-success border-success" title="Xong">D</a>
                                    </div>
                                    <a th:if="${userRole == 'LEADER'}" th:href="@{/task/sua(id=${task.id})}" class="btn btn-sm btn-light border text-primary ms-2 shadow-sm" title="Sửa việc"><i class="fa-solid fa-pen"></i></a>
                                    <a th:if="${userRole == 'LEADER'}" th:href="@{/task/xoa(id=${task.id})}" class="btn btn-sm btn-light border text-danger ms-1 shadow-sm" onclick="return confirm('Chắc chắn xóa?');" title="Xóa việc"><i class="fa-solid fa-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${dsNhiemVu.empty}" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-inbox fa-3x mb-3 text-light"></i>
                        <h5 class="fw-bold">Chưa có công việc nào!</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{modal-them-duan :: fragmentThemDuAn}"></div>
    <div th:replace="~{modal-them-task :: fragmentThemTask}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
