<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="fragmentThemDuAn" class="modal fade" id="modalThemDuAn" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-folder-plus me-2"></i>THÊM DỰ ÁN MỚI</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="/duan/them" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên dự án</label>
                            <input type="text" name="tenDuAn" class="form-control" required placeholder="Nhập tên dự án...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả ngắn gọn</label>
                            <textarea name="moTa" class="form-control" rows="3" placeholder="Nhập mục tiêu, công nghệ sử dụng..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-primary fw-bold">LƯU DỰ ÁN</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
