<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Chỉnh Sửa Nhiệm Vụ - Task Manager')}"></head>

<body class="bg-light overflow-hidden">
    <div class="d-flex" style="height: 100vh;">

        <div th:replace="~{fragments :: sidebar('dashboard')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">

            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
                <a th:href="@{/dashboard}" class="btn btn-light border shadow-sm me-3">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </a>
                <h3 class="fw-bold text-dark m-0">
                    <i class="fa-solid fa-pen-to-square text-warning me-2"></i>Chỉnh Sửa Nhiệm Vụ
                    <span class="text-muted fs-5 fw-normal" th:text="${'#' + task.id}"></span>
                </h3>
            </div>

            <div class="card border-0 shadow-sm rounded-3 col-md-8 col-lg-6">
                <div class="card-header bg-warning text-dark py-3">
                    <h5 class="fw-bold m-0">
                        <i class="fa-solid fa-clipboard-check me-2"></i>Thông Tin Nhiệm Vụ
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form action="/task/capnhat" method="POST">
                        <input type="hidden" name="id" th:value="${task.id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề công việc</label>
                            <input type="text" name="tieuDe" th:value="${task.tieuDe}"
                                   class="form-control" required
                                   placeholder="Nhập tiêu đề công việc...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea name="noiDung" th:text="${task.noiDung}"
                                      class="form-control" rows="4"
                                      placeholder="Mô tả các đầu việc cần làm..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fa-regular fa-calendar-xmark text-danger me-1"></i>Hạn chót (Deadline)
                            </label>
                            <input type="date" name="deadline" th:value="${task.deadline}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fa-solid fa-folder text-primary me-1"></i>Thuộc dự án
                            </label>
                            <select name="duAnId" class="form-select">
                                <option th:each="da : ${dsDuAn}"
                                        th:value="${da.id}"
                                        th:text="${da.tenDuAn}"
                                        th:selected="${da.id == task.duAn?.id}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                <i class="fa-solid fa-user text-success me-1"></i>Giao cho nhân viên
                            </label>
                            <select name="nhanVienId" class="form-select">
                                <option th:each="nd : ${dsNguoiDung}"
                                        th:value="${nd.id}"
                                        th:text="${nd.hoTen}"
                                        th:selected="${nd.id == task.nguoiThucHien?.id}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between pt-2">
                            <a href="/dashboard" class="btn btn-secondary px-4">
                                <i class="fa-solid fa-xmark me-1"></i>Hủy bỏ
                            </a>
                            <button type="submit" class="btn btn-warning fw-bold px-4 text-dark shadow-sm">
                                <i class="fa-solid fa-floppy-disk me-2"></i>CẬP NHẬT
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
