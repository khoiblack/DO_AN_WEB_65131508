<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Chi Tiết Nhiệm Vụ')}"></head>
<body class="bg-light overflow-hidden">
    <div class="d-flex" style="height: 100vh;">
        <div th:replace="~{fragments :: sidebar('dashboard')}"></div>

        <div class="flex-grow-1 p-5 overflow-auto main-content">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary mb-4">
                <i class="fa-solid fa-arrow-left me-2"></i>Quay lại Bảng công việc
            </a>

            <div class="row g-4">
                <div class="col-md-5">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <span th:if="${task.trangThai == 'TODO'}" class="badge bg-secondary mb-3 px-3 py-2">CẦN LÀM</span>
                            <span th:if="${task.trangThai == 'DOING'}" class="badge bg-warning text-dark mb-3 px-3 py-2">ĐANG LÀM</span>
                            <span th:if="${task.trangThai == 'DONE'}" class="badge bg-success mb-3 px-3 py-2">HOÀN THÀNH</span>

                            <h3 class="fw-bold text-dark mb-3" th:text="${task.tieuDe}">Tiêu đề nhiệm vụ</h3>
                            
                            <p class="text-muted mb-4" th:text="${task.noiDung != null ? task.noiDung : 'Không có mô tả chi tiết.'}"></p>
                            
                            <hr>
                            <ul class="list-unstyled mb-0">
                                <li class="mb-3">
                                    <i class="fa-solid fa-folder text-primary me-2"></i> <strong>Dự án:</strong> 
                                    <span th:text="${task.duAn?.tenDuAn}"></span>
                                </li>
                                <li class="mb-3">
                                    <i class="fa-solid fa-user-tie text-success me-2"></i> <strong>Người thực hiện:</strong> 
                                    <span th:text="${task.nguoiThucHien?.hoTen}"></span>
                                </li>
                                <li>
                                    <i class="fa-solid fa-clock text-danger me-2"></i> <strong>Hạn chót:</strong> 
                                    <span class="text-danger fw-bold" th:text="${task.deadline}"></span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card shadow-sm border-0 rounded-4 d-flex flex-column" style="height: 75vh;">
                        <div class="card-header bg-white border-bottom p-4">
                            <h5 class="fw-bold m-0"><i class="fa-regular fa-comments me-2 text-primary"></i>Trao đổi & Bình luận</h5>
                        </div>
                        
                        <div class="card-body overflow-auto p-4" style="background-color: #f8f9fa;" id="chat-box">
                            
                            <div th:if="${dsBinhLuan.empty}" class="text-center text-muted mt-5">
                                <i class="fa-regular fa-message fa-3x mb-3 text-light"></i>
                                <p>Chưa có bình luận nào. Hãy bắt đầu cuộc trò chuyện!</p>
                            </div>

                            <div th:each="cmt : ${dsBinhLuan}" class="mb-4">
                                <div th:if="${cmt.nguoiDung.id != userId}" class="d-flex justify-content-start">
                                    <div style="max-width: 75%;">
                                        <small class="text-muted mb-1 d-block fw-bold" th:text="${cmt.nguoiDung.hoTen}">Tên người khác</small>
                                        <div class="p-3 rounded-3 bg-white border shadow-sm" th:text="${cmt.noiDung}">Nội dung</div>
                                        <small class="text-muted mt-1 d-block" style="font-size: 0.75rem;" th:text="${#temporals.format(cmt.thoiGianTao, 'dd/MM/yyyy HH:mm')}"></small>
                                    </div>
                                </div>

                                <div th:if="${cmt.nguoiDung.id == userId}" class="d-flex justify-content-end">
                                    <div style="max-width: 75%; text-align: right;">
                                        <small class="text-muted mb-1 d-block fw-bold">Bạn</small>
                                        <div class="p-3 rounded-3 bg-primary text-white shadow-sm text-start" th:text="${cmt.noiDung}">Nội dung</div>
                                        <small class="text-muted mt-1 d-block" style="font-size: 0.75rem;" th:text="${#temporals.format(cmt.thoiGianTao, 'dd/MM/yyyy HH:mm')}"></small>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="card-footer bg-white border-top p-3">
                            <form th:action="@{/task/comment/them}" method="post" class="d-flex align-items-center">
                                <input type="hidden" name="taskId" th:value="${task.id}">
                                <input type="text" name="noiDung" class="form-control rounded-pill me-2 px-4 py-2" placeholder="Nhập nội dung bình luận..." required autocomplete="off">
                                <button type="submit" class="btn btn-primary rounded-circle" style="width: 45px; height: 45px;">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var chatBox = document.getElementById("chat-box");
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
