<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng Nhập - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0 fw-bold"><i class="fa-solid fa-clipboard-check me-2"></i>TASK MANAGER</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h5 class="text-muted">Đăng nhập hệ thống</h5>
                        </div>

                        <div th:if="${error}" class="alert alert-danger py-2 text-center" th:text="${error}"></div>
                        
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                    <input type="text" name="username" class="form-control" required placeholder="Nhập tài khoản...">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu...">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 fw-bold fs-5">ĐĂNG NHẬP</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
