<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Quản Lý Nhân Sự - Task Manager')}"></head>

<body class="bg-light overflow-hidden">
    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('users')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0"><i class="fa-solid fa-users-gear text-primary me-2"></i>Danh Sách Nhân Sự</h3>
                
                <button class="btn btn-primary fw-bold shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#modalThemUser">
                    <i class="fa-solid fa-user-plus me-2"></i>CẤP TÀI KHOẢN MỚI
                </button>
            </div>

            <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0 bg-white">
                        <thead class="table-dark">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Họ và Tên</th>
                                <th class="py-3">Username</th>
                                <th class="py-3">Quyền hạn</th>
                                <th class="py-3 text-end px-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="nd : ${dsNguoiDung}">
                                <td class="fw-bold px-4 text-muted" th:text="${'#' + nd.id}">1</td>
                                <td class="fw-bold text-dark" th:text="${nd.hoTen}">Tên</td>
                                <td class="text-primary fw-semibold" th:text="${nd.username}">User</td>
                                <td>
                                    <span th:if="${nd.vaiTro == 'LEADER'}" class="badge bg-danger px-3 py-2 rounded-pill">QUẢN LÝ</span>
                                    <span th:if="${nd.vaiTro == 'MEMBER'}" class="badge bg-info text-dark px-3 py-2 rounded-pill">NHÂN VIÊN</span>
                                </td>
                                <td class="text-end px-4">
                                    <a th:href="@{/users/sua(id=${nd.id})}" class="btn btn-sm btn-outline-primary shadow-sm"><i class="fa-solid fa-pen"></i> Sửa</a>
                                    <a th:href="@{/users/xoa(id=${nd.id})}" class="btn btn-sm btn-outline-danger shadow-sm ms-1" onclick="return confirm('Chắc chắn muốn xóa tài khoản này?');"><i class="fa-solid fa-trash"></i> Xóa</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{modal-them-user :: fragmentThemUser}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
