<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Thống Kê Báo Cáo - Task Manager')}"></head>

<body class="bg-light overflow-hidden">

    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('reports')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0"><i class="fa-solid fa-chart-pie text-danger me-2"></i>Thống Kê & Báo Cáo</h3>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card bg-primary text-white border-0 shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-layer-group fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${tongSo}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Tổng công việc</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-secondary text-white border-0 shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-clipboard-list fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${todo}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Cần làm (TODO)</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-dark border-0 shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-spinner fa-spin fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${doing}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Đang làm (DOING)</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white border-0 shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-check-circle fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${done}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Hoàn thành (DONE)</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 m-auto">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-white border-bottom py-3 text-center">
                            <h5 class="fw-bold m-0 text-dark">Biểu đồ tiến độ dự án</h5>
                        </div>
                        <div class="card-body p-4 d-flex justify-content-center">
                            <div style="width: 350px; height: 350px;">
                                <canvas id="myChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        
        const soTodo = /*[[${todo}]]*/ 0;
        const soDoing = /*[[${doing}]]*/ 0;
        const soDone = /*[[${done}]]*/ 0;

        
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Cần làm (TODO)', 'Đang làm (DOING)', 'Hoàn thành (DONE)'],
                datasets: [{
                    data: [soTodo, soDoing, soDone],
                    backgroundColor: [
                        '#6c757d', 
                        '#ffc107', 
                        '#198754'  
                    ],
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>
</body>
</html>
