<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Thống Kê Báo Cáo - Task Manager')}"></head>

<body class="bg-light overflow-hidden">
    
    <style>
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
        }
    </style>

    <div class="d-flex" style="height: 100vh;">
        
        <div th:replace="~{fragments :: sidebar('reports')}"></div>

        <div class="flex-grow-1 bg-light p-5 overflow-auto main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0"><i class="fa-solid fa-chart-pie text-danger me-2"></i>Thống Kê & Báo Cáo</h3>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card bg-primary text-white border-0 shadow-sm h-100 card-hover" onclick="showTaskDetail('ALL', 'TẤT CẢ CÔNG VIỆC', 'bg-primary')">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-layer-group fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${tongSo}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Tổng công việc</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-secondary text-white border-0 shadow-sm h-100 card-hover" onclick="showTaskDetail('TODO', 'CÔNG VIỆC CẦN LÀM', 'bg-secondary')">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-clipboard-list fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${todo}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Cần làm (TODO)</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-dark border-0 shadow-sm h-100 card-hover" onclick="showTaskDetail('DOING', 'CÔNG VIỆC ĐANG LÀM', 'bg-warning')">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-spinner fa-spin fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${doing}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Đang làm (DOING)</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white border-0 shadow-sm h-100 card-hover" onclick="showTaskDetail('DONE', 'CÔNG VIỆC HOÀN THÀNH', 'bg-success')">
                        <div class="card-body text-center py-4">
                            <i class="fa-solid fa-check-circle fa-2x mb-2 opacity-75"></i>
                            <h2 class="fw-bold display-5 mb-0" th:text="${done}">0</h2>
                            <p class="mb-0 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;">Hoàn thành (DONE)</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 m-auto">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-header bg-white border-bottom py-3 text-center">
                            <h5 class="fw-bold m-0 text-dark">Biểu đồ tiến độ dự án</h5>
                        </div>
                        <div class="card-body p-4 d-flex justify-content-center">
                            <div style="width: 350px; height: 350px;">
                                <canvas id="myChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalTaskDetail" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header text-white" id="modalDetailHeader">
                    <h5 class="modal-title fw-bold" id="modalDetailTitle"><i class="fa-solid fa-list-check me-2"></i>Chi Tiết Công Việc</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light position-sticky top-0">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Tiêu đề công việc</th>
                                <th class="py-3">Người thực hiện</th>
                                <th class="py-3">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="detailTableBody">
                            <tr th:each="task : ${dsNhiemVu}" th:classappend="'task-row status-' + ${task.trangThai}">
                                <td class="px-4 text-muted fw-bold" th:text="${'#' + task.id}"></td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${task.tieuDe}"></div>
                                    <small class="text-danger fw-semibold"><i class="fa-regular fa-clock me-1"></i> <span th:text="${task.deadline}"></span></small>
                                </td>
                                <td>
                                    <span class="badge bg-info bg-opacity-25 text-info-emphasis border border-info px-2 py-1" th:if="${task.nguoiThucHien != null}">
                                        <i class="fa-solid fa-user me-1"></i> <span th:text="${task.nguoiThucHien.hoTen}"></span>
                                    </span>
                                    <span class="badge bg-secondary px-2 py-1" th:if="${task.nguoiThucHien == null}">Chưa giao</span>
                                </td>
                                <td>
                                    <span th:if="${task.trangThai == 'TODO'}" class="badge bg-secondary px-3 py-2 rounded-pill">CẦN LÀM</span>
                                    <span th:if="${task.trangThai == 'DOING'}" class="badge bg-warning text-dark px-3 py-2 rounded-pill">ĐANG LÀM</span>
                                    <span th:if="${task.trangThai == 'DONE'}" class="badge bg-success px-3 py-2 rounded-pill">HOÀN THÀNH</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="noDataMessage" class="text-center py-5 d-none">
                        <i class="fa-solid fa-box-open fa-3x text-muted mb-2 opacity-50"></i>
                        <h6 class="text-muted">Không có công việc nào trong mục này.</h6>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        // 1. VẼ BIỂU ĐỒ (Giữ nguyên như cũ)
        const soTodo = /*[[${todo}]]*/ 0;
        const soDoing = /*[[${doing}]]*/ 0;
        const soDone = /*[[${done}]]*/ 0;

        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Cần làm (TODO)', 'Đang làm (DOING)', 'Hoàn thành (DONE)'],
                datasets: [{
                    data: [soTodo, soDoing, soDone],
                    backgroundColor: ['#6c757d', '#ffc107', '#198754'],
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 10
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        
        let detailModal;
        document.addEventListener("DOMContentLoaded", function() {
            
            detailModal = new bootstrap.Modal(document.getElementById('modalTaskDetail'));
        });

        function showTaskDetail(statusFilter, title, bgClass) {
            
            document.getElementById('modalDetailTitle').innerHTML = '<i class="fa-solid fa-list-check me-2"></i>' + title;
            document.getElementById('modalDetailHeader').className = 'modal-header text-white ' + bgClass;
            
           
            if (bgClass === 'bg-warning') {
                document.getElementById('modalDetailHeader').classList.replace('text-white', 'text-dark');
                document.querySelector('#modalDetailHeader .btn-close').classList.remove('btn-close-white');
            } else {
                document.querySelector('#modalDetailHeader .btn-close').classList.add('btn-close-white');
            }

            
            let visibleCount = 0;
            const rows = document.querySelectorAll('.task-row');
            
            rows.forEach(row => {
                if (statusFilter === 'ALL' || row.classList.contains('status-' + statusFilter)) {
                    row.style.display = ''; 
                    visibleCount++;
                } else {
                    row.style.display = 'none'; 
                }
            });

            
            const noDataMsg = document.getElementById('noDataMessage');
            if (visibleCount === 0) {
                noDataMsg.classList.remove('d-none');
            } else {
                noDataMsg.classList.add('d-none');
            }

            
            detailModal.show();
        }
    </script>
</body>
</html>
